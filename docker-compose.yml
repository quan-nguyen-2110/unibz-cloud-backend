services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      AWS_REGION: us-east-1
      ENABLE_WORKERS: "false"
      DEV_MEMORY_STORE: "true"
      # Optional: point to real AWS tables when credentials are configured
      # COGNITO_USER_POOL_ID=
      # DYNAMO_PLANS_TABLE=squadup-plans
